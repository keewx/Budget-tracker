<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

/* ---------- cloud storage (Firestore, scoped to the signed-in user) ---------- */
const db = firebase.firestore();
window.storage = {
  get: async (key) => {
    const user = firebase.auth().currentUser;
    if (!user) return null;
    const snap = await db.collection("budgetData").doc(user.uid).get();
    if (!snap.exists) return null;
    return { key, value: JSON.stringify(snap.data() || {}) };
  },
  set: async (key, value) => {
    const user = firebase.auth().currentUser;
    if (!user) return null;
    const data = JSON.parse(value);
    await db.collection("budgetData").doc(user.uid).set(data);
    return { key, value };
  },
};

/* ---------- tiny inline icon set (replaces lucide-react) ---------- */
const Icon = ({ children, size = 16, style }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
    {children}
  </svg>
);
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>;
const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></Icon>;
const Pencil = (p) => <Icon {...p}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" /></Icon>;
const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></Icon>;
const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>;
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></Icon>;
const TrendingDown = (p) => <Icon {...p}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7" /><polyline points="16 17 22 17 22 11" /></Icon>;
const Wallet = (p) => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></Icon>;

/* ---------- tiny inline donut chart (replaces recharts) ---------- */
function polarToCartesian(cx, cy, r, angle) {
  const rad = ((angle - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function arcPath(cx, cy, rOuter, rInner, startAngle, endAngle) {
  const p0 = polarToCartesian(cx, cy, rOuter, endAngle);
  const p1 = polarToCartesian(cx, cy, rOuter, startAngle);
  const p2 = polarToCartesian(cx, cy, rInner, startAngle);
  const p3 = polarToCartesian(cx, cy, rInner, endAngle);
  const large = endAngle - startAngle > 180 ? 1 : 0;
  return `M ${p0.x} ${p0.y} A ${rOuter} ${rOuter} 0 ${large} 0 ${p1.x} ${p1.y} L ${p2.x} ${p2.y} A ${rInner} ${rInner} 0 ${large} 1 ${p3.x} ${p3.y} Z`;
}
function Donut({ data, size = 160 }) {
  const total = data.reduce((a, d) => a + d.value, 0) || 1;
  const cx = size / 2, cy = size / 2, rOuter = size * 0.49, rInner = size * 0.25;
  let acc = 0;
  const [hover, setHover] = useState(null);
  return (
    <svg width={size} height={size}>
      {data.map((d, i) => {
        const start = (acc / total) * 360;
        acc += d.value;
        const end = (acc / total) * 360;
        const gap = data.length > 1 ? 1.5 : 0;
        const a0 = start + gap / 2;
        const a1 = end - gap / 2;
        const span = a1 - a0;
        // A single arc command can't draw a full 360° circle (start/end points coincide),
        // so a 100%-share slice is split into two half-arcs instead.
        const path =
          span >= 359.9
            ? `${arcPath(cx, cy, rOuter, rInner, a0, a0 + 180)} ${arcPath(cx, cy, rOuter, rInner, a0 + 180, a0 + 360)}`
            : arcPath(cx, cy, rOuter, rInner, a0, a1);
        return (
          <path key={i} d={path}
                fill={d.color} stroke="#1B1E26" strokeWidth="2"
                onMouseEnter={() => setHover(d)} onMouseLeave={() => setHover(null)}
                style={{ cursor: "pointer" }} />
        );
      })}
      {hover && (
        <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill="#E8E6E1" fontSize="12">
          {fmt(hover.value)}
        </text>
      )}
    </svg>
  );
}

function Calendar({ month, dayTotals, selectedDay, onSelectDay }) {
  const year = month.getFullYear();
  const m = month.getMonth();
  const daysInMonth = new Date(year, m + 1, 0).getDate();
  const firstWeekday = new Date(year, m, 1).getDay(); // 0 = Sunday
  const today = todayISO();
  const weekdayLabels = ["S", "M", "T", "W", "T", "F", "S"];

  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div>
      <div style={styles.calWeekRow}>
        {weekdayLabels.map((w, i) => <div key={i} style={styles.calWeekLabel}>{w}</div>)}
      </div>
      <div style={styles.calGrid}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const dateStr = `${year}-${pad(m + 1)}-${pad(d)}`;
          const totals = dayTotals[dateStr];
          const isToday = dateStr === today;
          const isSelected = dateStr === selectedDay;
          const net = totals ? totals.income - totals.expense : 0;
          return (
            <button
              key={i}
              onClick={() => onSelectDay(isSelected ? null : dateStr)}
              style={{
                ...styles.calCell,
                ...(isSelected ? styles.calCellSelected : {}),
                ...(isToday && !isSelected ? styles.calCellToday : {}),
              }}
              title={totals ? `Income ${fmt(totals.income)} · Expense ${fmt(totals.expense)}` : "No activity"}
            >
              <span style={styles.calDayNum}>{d}</span>
              {totals && (
                <span
                  style={{
                    ...styles.calDot,
                    background: net > 0 ? "#7FA98F" : net < 0 ? "#C97B5A" : "#8B8F99",
                  }}
                />
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}


const pad = (n) => String(n).padStart(2, "0");
const monthKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
const monthLabel = (d) => d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; };
const fmt = (n) => new Intl.NumberFormat(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);

const DEFAULT_CATEGORIES = {
  income: [
    { id: "inc-salary", label: "Salary", color: "#7FA98F" },
    { id: "inc-freelance", label: "Freelance", color: "#9FBFA0" },
    { id: "inc-other", label: "Other income", color: "#B9D2B8" },
  ],
  expense: [
    { id: "exp-housing", label: "Housing", color: "#C9A15A" },
    { id: "exp-food", label: "Food", color: "#C97B5A" },
    { id: "exp-transport", label: "Transport", color: "#7C93C9" },
    { id: "exp-subs", label: "Subscriptions", color: "#A98FC9" },
    { id: "exp-fun", label: "Entertainment", color: "#C98FAF" },
    { id: "exp-savings", label: "Savings", color: "#5AA6A0" },
    { id: "exp-other", label: "Other", color: "#8B8F99" },
  ],
};
const STORAGE_KEY = "budget-tracker-state";

function BudgetTracker({ userEmail }) {
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [transactions, setTransactions] = useState([]);
  const [activeMonth, setActiveMonth] = useState(new Date());
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [addingCatFor, setAddingCatFor] = useState(null);
  const [newCatText, setNewCatText] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("date-desc");
  const [selectedDay, setSelectedDay] = useState(null);

  const [form, setForm] = useState({ type: "expense", categoryId: "exp-food", amount: "", note: "", date: todayISO() });

  useEffect(() => { setSelectedDay(null); }, [activeMonth]);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          if (parsed.categories) setCategories(parsed.categories);
          if (parsed.transactions) setTransactions(parsed.transactions);
        }
      } catch (e) {} finally { setLoaded(true); }
    })();
  }, []);

  const persist = useCallback(async (nextCategories, nextTransactions) => {
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify({ categories: nextCategories, transactions: nextTransactions }));
      setError(result ? null : "Couldn't save — changes may not persist.");
    } catch (e) { setError("Couldn't save — changes may not persist."); }
  }, []);

  const monthTxns = useMemo(() => transactions.filter((t) => t.date.slice(0, 7) === monthKey(activeMonth)), [transactions, activeMonth]);
  const totalIncome = monthTxns.filter((t) => t.type === "income").reduce((a, t) => a + t.amount, 0);
  const totalExpense = monthTxns.filter((t) => t.type === "expense").reduce((a, t) => a + t.amount, 0);
  const net = totalIncome - totalExpense;

  const categoryTotals = useMemo(() => {
    const map = {};
    monthTxns.filter((t) => t.type === "expense").forEach((t) => { map[t.categoryId] = (map[t.categoryId] || 0) + t.amount; });
    return map;
  }, [monthTxns]);

  const dayTotals = useMemo(() => {
    const map = {};
    monthTxns.forEach((t) => {
      if (!map[t.date]) map[t.date] = { income: 0, expense: 0 };
      map[t.date][t.type] += t.amount;
    });
    return map;
  }, [monthTxns]);

  const findCategory = (id) => [...categories.income, ...categories.expense].find((c) => c.id === id) || { label: "Uncategorized", color: "#8B8F99" };

  const visibleTxns = useMemo(() => {
    const q = search.trim().toLowerCase();
    let list = monthTxns;
    if (selectedDay) list = list.filter((t) => t.date === selectedDay);
    if (q) {
      list = list.filter((t) => {
        const cat = findCategory(t.categoryId);
        return t.note.toLowerCase().includes(q) || cat.label.toLowerCase().includes(q);
      });
    }
    const sorted = [...list];
    sorted.sort((a, b) => {
      switch (sortBy) {
        case "date-asc": return a.date.localeCompare(b.date) || a.id.localeCompare(b.id);
        case "amount-desc": return b.amount - a.amount;
        case "amount-asc": return a.amount - b.amount;
        default: return b.date.localeCompare(a.date) || b.id.localeCompare(a.id); // date-desc
      }
    });
    return sorted;
  }, [monthTxns, search, sortBy, selectedDay, categories]);

  const resetForm = () => {
    setForm({ type: "expense", categoryId: categories.expense[0]?.id, amount: "", note: "", date: todayISO() });
    setEditingId(null);
  };

  const startAdd = () => {
    if (showForm && !editingId) { setShowForm(false); return; }
    resetForm();
    setShowForm(true);
  };

  const startEdit = (t) => {
    setForm({ type: t.type, categoryId: t.categoryId, amount: String(t.amount), note: t.note, date: t.date });
    setEditingId(t.id);
    setShowForm(true);
  };

  const cancelForm = () => {
    resetForm();
    setShowForm(false);
  };

  const submitForm = () => {
    const amt = parseFloat(form.amount);
    if (!amt || amt <= 0 || !form.categoryId) return;
    let next;
    if (editingId) {
      next = transactions.map((t) =>
        t.id === editingId ? { ...t, type: form.type, categoryId: form.categoryId, amount: amt, note: form.note.trim(), date: form.date } : t
      );
    } else {
      const txn = { id: `t-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, type: form.type, categoryId: form.categoryId, amount: amt, note: form.note.trim(), date: form.date };
      next = [txn, ...transactions];
    }
    setTransactions(next);
    persist(categories, next);
    resetForm();
    setShowForm(false);
  };

  const deleteTxn = (id) => {
    const next = transactions.filter((t) => t.id !== id);
    setTransactions(next);
    persist(categories, next);
    if (editingId === id) cancelForm();
  };

  const updateCategoryColor = (type, catId, color) => {
    const next = { ...categories, [type]: categories[type].map((c) => (c.id === catId ? { ...c, color } : c)) };
    setCategories(next);
    persist(next, transactions);
  };

  const addCategory = (type) => {
    const text = newCatText.trim();
    if (!text) return;
    if (categories[type].some((c) => c.label.toLowerCase() === text.toLowerCase())) { setNewCatText(""); setAddingCatFor(null); return; }
    const palette = ["#7FA98F", "#C9A15A", "#7C93C9", "#C97B5A", "#A98FC9", "#5AA6A0", "#C98FAF"];
    const used = new Set(categories[type].map((c) => c.color));
    const color = palette.find((c) => !used.has(c)) || palette[Math.floor(Math.random() * palette.length)];
    const id = `${type}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
    const next = { ...categories, [type]: [...categories[type], { id, label: text, color }] };
    setCategories(next);
    persist(next, transactions);
    setNewCatText("");
    setAddingCatFor(null);
  };

  if (!loaded) return <div style={styles.page}><div style={{ color: "#8B8F99" }}>Loading…</div></div>;

  return (
    <div style={styles.page}>
      <div style={styles.container} className="app-shell">
        <header style={styles.header}>
          <div>
            <div style={styles.eyebrow}>Keewx{userEmail ? ` · ${userEmail}` : ""}</div>
            <h1 style={styles.title}>Budget Ledger</h1>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...styles.iconWrap, background: "#B08D5722", color: "#B08D57", border: "none", cursor: "pointer" }} onClick={() => firebase.auth().signOut()} aria-label="Log out">
              <LogOut size={16} />
            </button>
          </div>
        </header>

        <div className="layout-grid">
        <div className="col-left">

        <div style={styles.dateNav}>
          <button style={styles.navBtn} onClick={() => setActiveMonth((d) => new Date(d.getFullYear(), d.getMonth() - 1, 1))}><ChevronLeft size={18} /></button>
          <div style={styles.dateLabel}>{monthLabel(activeMonth)}</div>
          <button style={styles.navBtn} onClick={() => setActiveMonth((d) => new Date(d.getFullYear(), d.getMonth() + 1, 1))}><ChevronRight size={18} /></button>
        </div>

        {error && <div style={styles.errorBanner}>{error}</div>}

        <div style={styles.summaryRow}>
          <div style={styles.summaryCard}>
            <div style={{ ...styles.summaryIcon, color: "#7FA98F" }}><TrendingUp size={14} /></div>
            <div style={styles.summaryLabel}>Income</div>
            <div style={{ ...styles.summaryValue, color: "#7FA98F" }}>{fmt(totalIncome)}</div>
          </div>
          <div style={styles.summaryCard}>
            <div style={{ ...styles.summaryIcon, color: "#C97B5A" }}><TrendingDown size={14} /></div>
            <div style={styles.summaryLabel}>Expenses</div>
            <div style={{ ...styles.summaryValue, color: "#C97B5A" }}>{fmt(totalExpense)}</div>
          </div>
          <div style={styles.summaryCard}>
            <div style={{ ...styles.summaryIcon, color: net >= 0 ? "#7FA98F" : "#C97B5A" }}><Wallet size={14} /></div>
            <div style={styles.summaryLabel}>Net</div>
            <div style={{ ...styles.summaryValue, color: net >= 0 ? "#7FA98F" : "#C97B5A" }}>{fmt(net)}</div>
          </div>
        </div>

        <section style={styles.card}>
          <div style={styles.cardHeaderRow}>
            <h2 style={styles.cardTitle}>Calendar</h2>
            {selectedDay && (
              <button style={styles.dayFilterChip} onClick={() => setSelectedDay(null)}>
                {selectedDay} <X size={11} />
              </button>
            )}
          </div>
          <Calendar month={activeMonth} dayTotals={dayTotals} selectedDay={selectedDay} onSelectDay={setSelectedDay} />
        </section>

        <button style={styles.primaryBtn} onClick={startAdd}><Plus size={16} style={{ marginRight: 6 }} />Add transaction</button>

        {showForm && (
          <div style={styles.card}>
            <div style={styles.cardHeaderRow}>
              <h2 style={styles.cardTitle}>{editingId ? "Edit transaction" : "New transaction"}</h2>
              <button style={styles.removeBtn} onClick={cancelForm} aria-label="Cancel"><X size={16} /></button>
            </div>
            <div style={styles.typeToggle}>
              <button style={{ ...styles.typeBtn, background: form.type === "expense" ? "#C97B5A22" : "transparent", color: form.type === "expense" ? "#C97B5A" : "#8B8F99", borderColor: form.type === "expense" ? "#C97B5A" : "#3A3E48" }}
                onClick={() => setForm({ ...form, type: "expense", categoryId: categories.expense[0]?.id })}>Expense</button>
              <button style={{ ...styles.typeBtn, background: form.type === "income" ? "#7FA98F22" : "transparent", color: form.type === "income" ? "#7FA98F" : "#8B8F99", borderColor: form.type === "income" ? "#7FA98F" : "#3A3E48" }}
                onClick={() => setForm({ ...form, type: "income", categoryId: categories.income[0]?.id })}>Income</button>
            </div>
            <input style={styles.input} type="number" inputMode="decimal" placeholder="Amount" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} />
            <select style={styles.input} value={form.categoryId} onChange={(e) => setForm({ ...form, categoryId: e.target.value })}>
              {categories[form.type].map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
            <input style={styles.input} type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
            <input style={styles.input} placeholder="Note (optional)" value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} />
            <button style={styles.primaryBtn} onClick={submitForm}>{editingId ? "Save changes" : "Save"}</button>
          </div>
        )}

        {Object.keys(categoryTotals).length > 0 && (
          <section style={styles.card}>
            <h2 style={styles.cardTitle}>Spending by category</h2>
            <div style={styles.pieRow}>
              <Donut data={Object.entries(categoryTotals).map(([catId, total]) => ({ name: findCategory(catId).label, value: total, color: findCategory(catId).color }))} />
              <div style={styles.pieLegend}>
                {Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]).map(([catId, total]) => {
                  const cat = findCategory(catId);
                  const pct = Math.round((total / totalExpense) * 100);
                  return (
                    <div key={catId} style={styles.legendRow}>
                      <span style={{ ...styles.legendDot, background: cat.color }} />
                      <span style={styles.legendLabel}>{cat.label}</span>
                      <span style={styles.legendValue}>{fmt(total)} · {pct}%</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>
        )}

        </div>

        <div className="col-right">

        <section style={{ ...styles.card }} className="txn-card">
          <div style={styles.cardHeaderRow}><h2 style={styles.cardTitle}>Transactions</h2></div>

          <div style={styles.searchRow}>
            <div style={styles.searchBox}>
              <Search size={14} style={{ color: "#5A5E68" }} />
              <input
                style={styles.searchInput}
                placeholder="Search note or category…"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
              />
              {search && (
                <button style={styles.searchClear} onClick={() => setSearch("")} aria-label="Clear search"><X size={12} /></button>
              )}
            </div>
            <select style={styles.sortSelect} value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
              <option value="date-desc">Newest first</option>
              <option value="date-asc">Oldest first</option>
              <option value="amount-desc">Amount: high–low</option>
              <option value="amount-asc">Amount: low–high</option>
            </select>
          </div>

          <ul style={styles.txnList}>
            {visibleTxns.length === 0 && (
              <li style={styles.emptyRow}>
                {search || selectedDay ? "No transactions match your filters." : "No transactions this month yet."}
              </li>
            )}
            {visibleTxns.map((t) => {
              const cat = findCategory(t.categoryId);
              const isEditing = editingId === t.id;
              return (
                <li key={t.id} style={{ ...styles.txnRow, ...(isEditing ? styles.txnRowActive : {}) }}>
                  <div style={{ ...styles.dot, background: cat.color }} />
                  <button style={styles.txnMain} onClick={() => startEdit(t)} aria-label={`Edit ${cat.label} transaction`}>
                    <div style={{ fontSize: 14 }}>{cat.label}</div>
                    {t.note && <div style={{ fontSize: 12, color: "#8B8F99" }}>{t.note}</div>}
                    <div style={{ fontSize: 11, color: "#5A5E68" }}>{t.date}</div>
                  </button>
                  <div style={{ fontSize: 14, fontWeight: 600, color: t.type === "income" ? "#7FA98F" : "#C97B5A" }}>
                    {t.type === "income" ? "+" : "-"}{fmt(t.amount)}
                  </div>
                  <button style={styles.removeBtn} onClick={() => startEdit(t)} aria-label="Edit"><Pencil size={13} /></button>
                  <button style={styles.removeBtn} onClick={() => deleteTxn(t.id)} aria-label="Delete"><Trash2 size={14} /></button>
                </li>
              );
            })}
          </ul>
        </section>

        <section style={styles.card}>
          <div style={styles.cardHeaderRow}><h2 style={styles.cardTitle}>Categories</h2></div>
          {["expense", "income"].map((type) => (
            <div key={type} style={{ marginBottom: 10 }}>
              <div style={styles.catGroupLabel}>{type === "expense" ? "Expense" : "Income"}</div>
              <div style={styles.catChips}>
                {categories[type].map((c) => (
                  <span key={c.id} style={{ ...styles.chip, borderColor: c.color, color: c.color }}>
                    <label style={styles.colorSwatchWrap}>
                      <span style={{ ...styles.colorSwatch, background: c.color }} />
                      <input type="color" value={c.color} onChange={(e) => updateCategoryColor(type, c.id, e.target.value)} style={styles.colorInput} aria-label={`Change color for ${c.label}`} />
                    </label>
                    {c.label}
                  </span>
                ))}
                <button style={styles.chipAdd} onClick={() => setAddingCatFor(addingCatFor === type ? null : type)}><Plus size={12} /></button>
              </div>
              {addingCatFor === type && (
                <div style={styles.addRow}>
                  <input autoFocus style={styles.addInput} placeholder="New category…" value={newCatText} onChange={(e) => setNewCatText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addCategory(type)} />
                  <button style={styles.addConfirm} onClick={() => addCategory(type)}>Add</button>
                </div>
              )}
            </div>
          ))}
        </section>

        </div>
        </div>
      </div>
    </div>
  );
}

function AuthGate() {
  const [status, setStatus] = useState("loading"); // loading | signedOut | signedIn
  const [user, setUser] = useState(null);
  const [mode, setMode] = useState("signin"); // signin | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged((u) => {
      setUser(u);
      setStatus(u ? "signedIn" : "signedOut");
    });
    return unsub;
  }, []);

  const friendlyError = (code) => {
    switch (code) {
      case "auth/email-already-in-use": return "That email already has an account — try signing in instead.";
      case "auth/invalid-email": return "That doesn't look like a valid email address.";
      case "auth/weak-password": return "Password should be at least 6 characters.";
      case "auth/wrong-password": case "auth/invalid-credential": case "auth/invalid-login-credentials": return "Incorrect email or password.";
      case "auth/user-not-found": return "No account found with that email.";
      case "auth/too-many-requests": return "Too many attempts — please wait a moment and try again.";
      default: return "Something went wrong. Please try again.";
    }
  };

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!email || !password) return;
    setBusy(true);
    try {
      if (mode === "signup") {
        await firebase.auth().createUserWithEmailAndPassword(email.trim(), password);
      } else {
        await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
      }
    } catch (err) {
      setError(friendlyError(err.code));
    } finally {
      setBusy(false);
    }
  };

  if (status === "loading") {
    return <div style={styles.page}><div style={{ color: "#8B8F99" }}>Loading…</div></div>;
  }

  if (status === "signedIn") {
    return <BudgetTracker key={user.uid} userEmail={user.email} />;
  }

  return (
    <div style={styles.page}>
      <div style={{ width: "100%", maxWidth: 360 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={styles.eyebrow}>Keewx</div>
          <h1 style={styles.title}>Budget Ledger</h1>
        </div>
        <form style={styles.card} onSubmit={submit}>
          <div style={styles.typeToggle}>
            <button type="button" style={{ ...styles.typeBtn, background: mode === "signin" ? "#B08D5722" : "transparent", color: mode === "signin" ? "#B08D57" : "#8B8F99", borderColor: mode === "signin" ? "#B08D57" : "#3A3E48" }} onClick={() => { setMode("signin"); setError(""); }}>Sign in</button>
            <button type="button" style={{ ...styles.typeBtn, background: mode === "signup" ? "#B08D5722" : "transparent", color: mode === "signup" ? "#B08D57" : "#8B8F99", borderColor: mode === "signup" ? "#B08D57" : "#3A3E48" }} onClick={() => { setMode("signup"); setError(""); }}>Create account</button>
          </div>
          <input style={styles.input} type="email" autoComplete="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} required />
          <input style={styles.input} type="password" autoComplete={mode === "signup" ? "new-password" : "current-password"} placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} />
          {error && <div style={styles.errorBanner}>{error}</div>}
          <button type="submit" style={styles.primaryBtn} disabled={busy}>
            {busy ? "Please wait…" : mode === "signup" ? "Create account" : "Sign in"}
          </button>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
